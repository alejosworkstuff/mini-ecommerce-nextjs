services:
  web:
    build:
      context: .
    container_name: mini-ecommerce-web
    ports:
      - "3000:3000"
    environment:
      REDIS_URL: redis://redis:6379
      NEXT_PUBLIC_WS_URL: ws://localhost:4001
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    container_name: mini-ecommerce-redis
    ports:
      - "6379:6379"

  realtime:
    image: node:20-alpine
    container_name: mini-ecommerce-realtime
    working_dir: /app
    command: ["sh", "-c", "npm ci && npm run dev:realtime"]
    volumes:
      - .:/app
    ports:
      - "4001:4001"

  postgres:
    image: postgres:16-alpine
    container_name: mini-ecommerce-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mini_ecommerce
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
